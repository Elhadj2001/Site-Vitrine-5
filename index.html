<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maison Téranga Events | Prestige</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuration Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            green: '#104911',   /* Vert Marque */
                            dark: '#052e05',
                            gold: '#D4AF37',    /* Or */
                            cream: '#F9F9F7',
                            gray: '#888888',
                        }
                    },
                    fontFamily: {
                        serif: ['"Cinzel"', 'serif'],
                        sans: ['"Lato"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #F9F9F7;
            color: #1A1A1A;
            overflow-x: hidden;
        }

        /* Animation d'apparition */
        .reveal-up {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-up.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Zoom image au survol */
        .img-zoom-container {
            overflow: hidden;
        }
        .img-zoom {
            transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .img-zoom-container:hover .img-zoom {
            transform: scale(1.05);
        }

        /* Couleur de sélection */
        ::selection {
            background: #104911;
            color: #D4AF37;
        }

        /* Navigation effet verre */
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(16, 73, 17, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Composants Utilitaires ---

        // Composant pour les icônes Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        const Button = ({ children, variant = 'primary', onClick, className = '' }) => {
            const baseStyle = "px-8 py-4 text-xs font-bold tracking-[0.2em] uppercase transition-all duration-500 ease-out border";
            const variants = {
                primary: "bg-brand-green border-brand-green text-white hover:bg-white hover:text-brand-green",
                outline: "bg-transparent border-white text-white hover:bg-white hover:text-brand-green",
                gold: "bg-brand-gold border-brand-gold text-white hover:bg-white hover:text-brand-gold"
            };

            return (
                <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        // Hook pour l'animation au scroll
        const useScrollReveal = () => {
            React.useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.reveal-up').forEach(el => observer.observe(el));
                
                // Initialisation des icônes
                if (window.lucide) window.lucide.createIcons();

                return () => observer.disconnect();
            }, []);
        };

        // --- Sections ---

        const Navbar = () => {
            const [isScrolled, setIsScrolled] = React.useState(false);
            const [isOpen, setIsOpen] = React.useState(false);

            React.useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'glass-nav py-4 shadow-sm' : 'bg-transparent py-8'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                        <a href="#" className="relative z-50 flex items-center gap-3">
                            <img src="images/logo.jpeg" alt="Logo" className="h-12 w-auto object-contain" />
                            <div className={`hidden md:block leading-none ${isScrolled ? 'text-brand-green' : 'text-white'}`}>
                                <span className="block font-serif font-bold tracking-widest text-lg">MAISON TÉRANGA EVENTS</span>
                            </div>
                        </a>

                        {/* Desktop Menu */}
                        <div className={`hidden md:flex items-center gap-8 text-xs font-bold tracking-[0.15em] uppercase ${isScrolled ? 'text-brand-green' : 'text-white'}`}>
                            {['Accueil', 'Philosophie', 'Services', 'Galerie'].map((item) => (
                                <a key={item} href={`#${item.toLowerCase()}`} className="hover:text-brand-gold transition-colors">{item}</a>
                            ))}
                            <a href="#contact" className={`px-6 py-3 border transition-all ${isScrolled ? 'border-brand-green hover:bg-brand-green hover:text-white' : 'border-white hover:bg-white hover:text-brand-green'}`}>
                                Réserver
                            </a>
                        </div>

                        {/* Mobile Toggle */}
                        <button onClick={() => setIsOpen(!isOpen)} className={`md:hidden z-50 ${isOpen ? 'text-brand-green' : (isScrolled ? 'text-brand-green' : 'text-white')}`}>
                            <Icon name={isOpen ? "x" : "menu"} size={24} />
                        </button>
                    </div>

                    {/* Mobile Fullscreen Menu */}
                    <div className={`fixed inset-0 bg-brand-cream z-40 flex flex-col items-center justify-center space-y-8 transition-transform duration-700 ${isOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        {['Accueil', 'Philosophie', 'Services', 'Galerie', 'Contact'].map((item) => (
                            <a 
                                key={item} 
                                href={`#${item.toLowerCase()}`} 
                                onClick={() => setIsOpen(false)}
                                className="font-serif text-3xl text-brand-green hover:text-brand-gold transition-colors"
                            >
                                {item}
                            </a>
                        ))}
                    </div>
                </nav>
            );
        };

        const Hero = () => {
            return (
                <section id="accueil" className="relative h-screen flex items-center justify-center overflow-hidden">
                    <div className="absolute inset-0 bg-brand-green">
                        <img 
                            src="images/image 1.jpg" 
                            alt="Hero Background" 
                            className="w-full h-full object-cover opacity-60 animate-[pulse_10s_ease-in-out_infinite]"
                        />
                        <div className="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-brand-green/90"></div>
                    </div>

                    <div className="relative z-10 text-center px-6 max-w-5xl mx-auto text-white">
                        <div className="reveal-up mb-6">
                            <span className="inline-block py-1 px-3 border border-brand-gold/50 text-brand-gold text-[10px] font-bold tracking-[0.3em] uppercase backdrop-blur-sm">
                                Agence Événementielle • Dakar
                            </span>
                        </div>
                        <h1 className="reveal-up font-serif text-5xl md:text-7xl lg:text-8xl leading-none mb-8">
                            L'Art de <br/> <span className="text-brand-gold italic">L'Exception</span>
                        </h1>
                        <p className="reveal-up text-lg md:text-xl font-light text-gray-200 mb-12 max-w-2xl mx-auto">
                            Nous transformons vos visions en réalités inoubliables, avec la rigueur des standards internationaux et la chaleur de l'hospitalité sénégalaise.
                        </p>
                        <div className="reveal-up flex flex-col sm:flex-row gap-4 justify-center">
                            <Button variant="gold" onClick={() => document.getElementById('contact').scrollIntoView()}>
                                Demander un Devis
                            </Button>
                        </div>
                    </div>
                </section>
            );
        };

        const Philosophie = () => (
            <section id="philosophie" className="py-32 bg-brand-cream text-brand-green relative overflow-hidden">
                <div className="absolute top-0 right-0 w-96 h-96 bg-brand-gold/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>

                <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16 items-center">
                    <div className="reveal-up">
                        <h3 className="font-sans text-xs font-bold tracking-[0.2em] text-brand-gold uppercase mb-4">Notre Signature</h3>
                        <h2 className="font-serif text-4xl md:text-5xl leading-tight mb-8">
                            Une approche hôtelière de l'événementiel
                        </h2>
                        <div className="space-y-6 text-brand-gray font-light text-lg">
                            <p>
                                Maison Téranga Events ne se contente pas d'organiser ; nous orchestrons. Chaque détail est pensé pour offrir une expérience fluide, élégante et mémorable.
                            </p>
                            <p>
                                Nos équipes, formées aux standards les plus exigeants, sont les ambassadrices de votre image. Discrétion, efficacité et sourire sont nos maîtres-mots.
                            </p>
                        </div>
                        
                        <div className="mt-12 grid grid-cols-2 gap-8 border-t border-brand-green/10 pt-8">
                            <div>
                                <p className="font-serif text-4xl text-brand-green">100%</p>
                                <p className="text-xs uppercase tracking-wider text-brand-gold mt-1">Excellence</p>
                            </div>
                            <div>
                                <p className="font-serif text-4xl text-brand-green">24/7</p>
                                <p className="text-xs uppercase tracking-wider text-brand-gold mt-1">Assistance</p>
                            </div>
                        </div>
                    </div>

                    <div className="relative reveal-up">
                        <div className="absolute -inset-4 border border-brand-green/20 z-0 transform translate-x-4 translate-y-4"></div>
                        <div className="img-zoom-container relative z-10 aspect-[3/4] shadow-2xl">
                            <img src="images/image 2.jpg" alt="Equipe" className="img-zoom w-full h-full object-cover" />
                        </div>
                    </div>
                </div>
            </section>
        );

        const Services = () => {
            const servicesList = [
                { title: "Accueil & Orientation", desc: "Gestion des flux et première impression irréprochable." },
                { title: "Protocole Officiel", desc: "Assistance VIP et respect des codes diplomatiques." },
                { title: "Coordination", desc: "Supervision technique et logistique le jour J." },
                { title: "Service Hôtelier", desc: "Personnel qualifié pour le service et la restauration." },
            ];

            return (
                <section id="services" className="py-32 bg-brand-green text-white">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-20 reveal-up">
                            <div>
                                <h2 className="font-serif text-4xl md:text-5xl">Nos Expertises</h2>
                                <p className="mt-4 text-gray-300 font-light max-w-md">Des prestations sur-mesure pour sublimer chaque instant de votre événement.</p>
                            </div>
                            <a href="#contact" className="hidden md:block text-brand-gold hover:text-white transition-colors text-sm font-bold tracking-[0.2em] uppercase border-b border-brand-gold pb-1">
                                Voir tous les services
                            </a>
                        </div>

                        <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-px bg-white/10 border border-white/10 reveal-up">
                            {servicesList.map((s, i) => (
                                <div key={i} className="bg-brand-green p-10 hover:bg-brand-dark transition-colors duration-500 group border border-white/5">
                                    <div className="h-12 w-12 rounded-full bg-white/5 flex items-center justify-center text-brand-gold mb-8 group-hover:bg-brand-gold group-hover:text-brand-green transition-all">
                                        <Icon name="check" size={20} />
                                    </div>
                                    <h3 className="font-serif text-xl mb-4">{s.title}</h3>
                                    <p className="text-sm text-gray-400 leading-relaxed group-hover:text-gray-200 transition-colors">
                                        {s.desc}
                                    </p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const MasonryGallery = () => {
            return (
                <section id="galerie" className="py-32 bg-brand-cream">
                    <div className="max-w-7xl mx-auto px-6 mb-16 text-center reveal-up">
                        <span className="font-sans text-xs font-bold tracking-[0.2em] text-brand-green uppercase">Portfolio</span>
                        <h2 className="font-serif text-4xl mt-4 text-brand-dark">Instants Capturés</h2>
                    </div>

                    <div className="max-w-[1920px] mx-auto px-4">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 auto-rows-[300px]">
                            {/* Grande image verticale */}
                            <div className="md:row-span-2 reveal-up img-zoom-container relative group overflow-hidden">
                                <img src="images/im1.jpg" className="img-zoom w-full h-full object-cover" alt="Gallery" />
                                <div className="absolute inset-0 bg-brand-green/80 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
                                    <p className="text-white font-serif text-2xl italic">Cérémonies</p>
                                </div>
                            </div>
                            
                            {/* Images Carrées */}
                            <div className="reveal-up img-zoom-container relative group overflow-hidden">
                                <img src="images/im2.jpg" className="img-zoom w-full h-full object-cover" alt="Gallery" />
                            </div>
                            <div className="reveal-up img-zoom-container relative group overflow-hidden">
                                <img src="images/im3.jpg" className="img-zoom w-full h-full object-cover" alt="Gallery" />
                            </div>

                            {/* Image Large */}
                            <div className="md:col-span-2 reveal-up img-zoom-container relative group overflow-hidden">
                                <img src="images/im4.jpg" className="img-zoom w-full h-full object-cover" alt="Gallery" />
                                <div className="absolute inset-0 bg-brand-green/80 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
                                    <p className="text-white font-serif text-2xl italic">Dîners de Gala</p>
                                </div>
                            </div>

                            <div className="reveal-up img-zoom-container relative group overflow-hidden">
                                <img src="images/im5.jpg" className="img-zoom w-full h-full object-cover" alt="Gallery" />
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

       const ContactModern = () => {
    return (
        <section id="contact" className="py-32 bg-brand-dark text-white relative">
            <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5"></div>
            
            <div className="max-w-4xl mx-auto px-6 relative z-10">
                <div className="text-center mb-16 reveal-up">
                    <h2 className="font-serif text-4xl md:text-6xl mb-6">Créons l'inoubliable</h2>
                    <p className="text-gray-400 font-light text-lg">
                        Basés à Dakar, nous opérons sur tout le Sénégal pour vos événements de prestige.
                    </p>
                </div>

                <div className="bg-white/5 backdrop-blur-md border border-white/10 p-8 md:p-12 reveal-up">
                    {/* MODIFICATION 1 : Ajout des attributs Netlify */}
                    <form 
                        name="contact-client" 
                        method="POST" 
                        data-netlify="true" 
                        className="space-y-8"
                    >
                        {/* MODIFICATION 2 : Input caché obligatoire pour React */}
                        <input type="hidden" name="form-name" value="contact-client" />

                        <div className="grid md:grid-cols-2 gap-8">
                            <div className="space-y-2">
                                <label className="text-xs uppercase tracking-wider text-brand-gold">Nom Complet</label>
                                {/* MODIFICATION 3 : Ajout de name="nom" */}
                                <input 
                                    type="text" 
                                    name="nom" 
                                    className="w-full bg-transparent border-b border-gray-600 py-3 text-white focus:border-brand-gold outline-none transition-colors" 
                                    placeholder="Votre nom" 
                                    required 
                                />
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs uppercase tracking-wider text-brand-gold">Téléphone</label>
                                {/* MODIFICATION 3 : Ajout de name="telephone" */}
                                <input 
                                    type="tel" 
                                    name="telephone" 
                                    className="w-full bg-transparent border-b border-gray-600 py-3 text-white focus:border-brand-gold outline-none transition-colors" 
                                    placeholder="+221 ..." 
                                    required
                                />
                            </div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs uppercase tracking-wider text-brand-gold">Email</label>
                            {/* MODIFICATION 3 : Ajout de name="email" */}
                            <input 
                                type="email" 
                                name="email" 
                                className="w-full bg-transparent border-b border-gray-600 py-3 text-white focus:border-brand-gold outline-none transition-colors" 
                                placeholder="votre@email.com" 
                                required
                            />
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs uppercase tracking-wider text-brand-gold">Détails du projet</label>
                            {/* MODIFICATION 3 : Ajout de name="message" */}
                            <textarea 
                                name="message"
                                rows="4" 
                                className="w-full bg-transparent border-b border-gray-600 py-3 text-white focus:border-brand-gold outline-none transition-colors" 
                                placeholder="Date, lieu, nombre d'invités..."
                                required
                            ></textarea>
                        </div>
                        <div className="pt-4 text-center">
                            <Button type="submit" variant="primary" className="w-full md:w-auto min-w-[200px]">
                                Envoyer
                            </Button>
                        </div>
                    </form>
                </div>

                {/* ... Le reste de votre code (footer) reste identique ... */}
                <div className="mt-20 flex flex-col md:flex-row justify-center items-center gap-12 text-center reveal-up">
                    <div>
                                <h4 className="font-serif text-brand-gold text-xl mb-2">Téléphone</h4>
                                <p className="text-gray-300 font-light">77 399 96 35</p>
                                <p className="text-gray-300 font-light">78 781 11 74</p>
                            </div>
                            <div className="w-px h-12 bg-white/20 hidden md:block"></div>
                            <div>
                                <h4 className="font-serif text-brand-gold text-xl mb-2">Email</h4>
                                <p className="text-gray-300 font-light">eventsteranga@gmail.com</p>
                            </div>
                            <div className="w-px h-12 bg-white/20 hidden md:block"></div>
                            <div>
                                <h4 className="font-serif text-brand-gold text-xl mb-2">Social</h4>
                                <a href="https://instagram.com/maisonterangaevents" className="text-gray-300 hover:text-white flex items-center gap-2 transition-colors">
                                    <Icon name="instagram" size={18} /> @maisonterangaevents
                                </a>
                    </div>
                </div>
            </div>
        </section>
    );
};

        const Footer = () => (
            <footer className="bg-black text-white py-8 border-t border-white/10 text-center">
                <p className="text-[10px] uppercase tracking-[0.2em] text-gray-500">
                    © {new Date().getFullYear()} Maison Téranga Events. All Rights Reserved.
                </p>
            </footer>
        );

        const App = () => {
            useScrollReveal();
            
            // Re-vérifier les icônes au rendu
            React.useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            return (
                <div className="antialiased">
                    <Navbar />
                    <Hero />
                    <Philosophie />
                    <Services />
                    <MasonryGallery />
                    <ContactModern />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <form name="contact-client" netlify hidden>
        <input type="text" name="nom" />
        <input type="tel" name="telephone" />
        <input type="email" name="email" />
        <textarea name="message"></textarea>
    </form>
</body>
</html>
